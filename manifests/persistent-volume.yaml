apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain  # ← 💡 Retains data even after PVC is deleted
  hostPath:             # ✅ Only for testing in Minikube/local
    path: /mnt/data
