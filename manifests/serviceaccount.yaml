# This tells Kubernetes which version of the API to use to create this object.
# v1 is the core version used for built-in resources like Pods, Services, ConfigMaps, and ServiceAccounts.
apiVersion: v1
# Specifies the type of Kubernetes object you’re defining.
# A ServiceAccount is used by pods to interact with the Kubernetes API securely (e.g., listing services, watching endpoints, etc.).
# It avoids using default credentials (default:default) which have limited or insecure permissions.
kind: ServiceAccount
# This block contains identifying data for the object.
metadata:
  # This is the name of the service account.
  # Pods will refer to this name when they want to use this account.
  #
  # You referenced this in your deployment.yaml using:
  # serviceAccountName: kubernetes-learning-sa
  name: kubernetes-learning-sa
  # Tells Kubernetes which namespace this service account will live in.
  # It only applies within this namespace (default in this case).
  # A pod in another namespace cannot use this service account unless it exists there too.
  namespace: default

# ✅ In Plain English:
# Create a service account named kubernetes-learning-sa in the default namespace. Pods can use this to authenticate and securely interact with the Kubernetes API.
