# ➡️ Specifies the API version of the Kubernetes object you're defining.
# apps/v1 is the stable version for deployments.
apiVersion: apps/v1

# ➡️ You're defining a Deployment resource — a controller that manages pods and ensures a specified number of them are running.
kind: Deployment

# ➡️ Metadata about this Kubernetes object.
metadata:
  # name: the name of the Deployment.
  # This is used to identify and manage the deployment (e.g., kubectl get deployment kubernetes-learning).
  name: kubernetes-learning

spec:
  # ➡️ The desired number of pod replicas (i.e., containers running your app).
  # Here, Kubernetes will ensure 2 pods are always running.
  replicas: 2
  # ➡️ This tells the Deployment:
  # “Which pods should I manage?”
  selector:
    # It matches pods whose labels include app: kubernetes-learning
    # Think of it like a filter: “Find pods with this label, and I’ll manage them.”
    matchLabels:
      app: kubernetes-learning

  # ⬇️ Add it here, under spec, before template
  # strategy controls how updates are rolled out.
  # It is not a property of individual pods (template).
  # It's part of the Deployment-level spec.
  # This is the rollout strategy for your Deployment. It tells Kubernetes how to apply updates when you change something in your Deployment (like a new image).
  strategy:
    # This sets the rollout type to RollingUpdate, which is the default strategy. It means:
    # Kubernetes will gradually replace old pods with new ones, without downtime, according to limits you define below.
    type: RollingUpdate
    rollingUpdate:
      # How many pods can be unavailable (i.e. not ready) at the same time during the update.
      # Meaning: At most, one pod can be offline at any point during the update.
      # This helps prevent too much disruption — you're limiting how many of your currently serving pods can go down.
      # You can also set this as a percentage, like "25%".
      # ✅ Example:
      # If your Deployment has replicas: 4, and maxUnavailable: 1, then during the update, at least 3 pods will always be available.
      maxUnavailable: 1 # number of pods that can be unavailable during update
      # How many extra pods can be scheduled above the desired replica count during the update.
      # Meaning: Kubernetes can temporarily create 1 additional pod during the update, before removing an old one.
      # Helps ensure new pods are up and ready before old ones are removed.
      # Also supports percentages like "50%".
      # ✅ Example:
      # If your Deployment has replicas: 2, and maxSurge: 1, then up to 3 pods may be running temporarily during the update.
      maxSurge: 1 # number of extra pods that can be scheduled during update

  # ➡️ This is the template for each pod created by this Deployment.
  template:
    metadata:
      # The labels here must match the selector above
      labels:
        # Every pod created will be
        app: kubernetes-learning

    # ➡️ Starts the definition of containers that should run inside each pod.
    spec:
     # ✅ Declare volumes
      volumes:
        - name: cfg
          configMap:
            name: kube-learning-config
      serviceAccountName: kubernetes-learning-sa
      # One pod can run multiple containers (like a sidecar), but here we have just one.
      containers:
          # ➡️ The name of the container inside the pod.
          # This name is used internally and for logs, monitoring, etc.
        - name: kubernetes-learning-container

          # ✅ Mount ConfigMap as file inside container
          volumeMounts:
            - name: cfg
              mountPath: /config

          # ➡️ The Docker image to use.
          # Here, it's a local image you’ve built with:
          # docker build -t kubernetes-learning:local .
          #
          #⚠️ If you used a public image or ECR image, this would be something like:
          # image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/kubernetes-learning:latest
          image: kubernetes-learning:v3333333333333333333333333333333333333333333333333333333333
          # This tells Kubernetes: “Don’t try to pull this image from Docker Hub or any registry; just use the local image inside Minikube.”
          imagePullPolicy: Never
          # ➡️ This tells Kubernetes:
          #
          # “My application inside the container listens on port 8080.”
          # It doesn’t expose this to the outside — it just tells Kubernetes how to route traffic inside the pod.
          # You need a Service object to expose this port outside the pod (you already have one in service.yaml).
          ports:
            - containerPort: 8080

          # ----------------- probes -----------------
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10

          readinessProbe:
              httpGet:
                path: /actuator/health/readiness
                port: 8080
                # This tells Kubernetes:
                #“Wait 60 seconds after the container starts before running the first liveness or readiness probe.”
                #
                #It gives your app time to boot up before Kubernetes starts checking if it's alive or ready.
                # Useful when your app takes time to initialize (like a Spring Boot app with a slow startup).
              initialDelaySeconds: 60
              # This tells Kubernetes:
              # “After the first probe, run the health check every 10 seconds.”
              # So once the initial 60-second delay is over, Kubernetes will check the endpoint:
              periodSeconds: 10

          # ── ★ resource requests & limits ──────────────
          # Parent key for all resource configuration. Groups requests and limits.
          resources:
            # Minimum amounts that Kubernetes guarantees to this container. They’re also used for scheduling.
            # Ensures your pod gets placed only on nodes that can spare these resources.
            requests: # “Guarantees”
              cpu: "100m"      # • 100 millicores (0.1 CPU) is *reserved* for this pod. Pod always gets that slice; HPA uses it as 100 % reference.
              memory: "150Mi"  # • 150 MiB RAM is *reserved*. Node must have at least this free when scheduling.
            # Upper bounds the container may consume.	Protects the cluster from “noisy-neighbor” pods.
            limits: # “Hard caps”
              # Allows bursting up to 0.3 CPU. If it tries to exceed this, kubelet throttles it. Prevents CPU starvation of other pods.
              cpu: "300m"      # • Pod can burst up to 0.3 CPU; beyond that it’s throttled
              # Hard-cap at 300 MiB. If the Java heap + overhead exceeds this, the container gets OOM-killed. Stops runaway memory leaks from crashing the node.
              memory: "300Mi"  # • If pod uses >300 MiB it will be OOM-killed

          # ✅ Inject config from ConfigMap and Secret
          envFrom:
            - configMapRef:
                name: kube-learning-config
            - secretRef:
                name: kube-learning-secret




# ✅ Summary (Plain English)
#“Run 2 pods of my Spring Boot app using the Docker image kubernetes-learning:local, each listening on port 8080.
# Label them as app: kubernetes-learning so I can control them. If a pod crashes, restart it. If I update the image, roll out the new version gradually.”